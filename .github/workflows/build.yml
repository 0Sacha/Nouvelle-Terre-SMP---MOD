name: Compiler & Publier NouvelleTerreBridge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compiler le mod
        uses: gradle/actions/setup-gradle@v3

      - run: ./gradlew build --no-daemon

      - name: Générer le resource pack HDV
        id: pack
        run: |
          python3 .github/scripts/gen_resourcepack.py nouvelle-terre-hdv.zip | tee /tmp/pack_out.txt
          HASH=$(grep '^HASH=' /tmp/pack_out.txt | cut -d'=' -f2)
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Lire la version du mod
        id: version
        run: |
          VERSION=$(grep '^mod_version' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          SHA=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-$SHA" >> $GITHUB_OUTPUT

      - name: Créer la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "NouvelleTerreBridge ${{ steps.version.outputs.version }} (${{ steps.version.outputs.sha }})"
          body: |
            Build automatique depuis le commit `${{ steps.version.outputs.sha }}`.

            **Installation mod :** dépose `nouvelle-terre-bridge-${{ steps.version.outputs.version }}.jar` dans `mods/`.

            **Resource pack HDV :** configure `resourcePackUrl` dans `nouvelle-terre-bridge.json` :
            ```
            "resourcePackUrl": "https://github.com/0Sacha/Nouvelle-Terre-SMP---MOD/releases/download/${{ steps.version.outputs.tag }}/nouvelle-terre-hdv.zip"
            ```
            SHA-1 : `${{ steps.pack.outputs.hash }}`
          files: |
            build/libs/nouvelle-terre-bridge-${{ steps.version.outputs.version }}.jar
            nouvelle-terre-hdv.zip
          make_latest: true
