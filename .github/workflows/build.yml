name: Compiler & Publier NouvelleTerreBridge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compiler le mod
        uses: gradle/actions/setup-gradle@v3

      - run: ./gradlew build --no-daemon

      - name: Lire la version du mod
        id: version
        run: |
          VERSION=$(grep '^mod_version' gradle.properties | cut -d'=' -f2 | tr -d ' ')
          SHA=$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION-$SHA" >> $GITHUB_OUTPUT

      - name: Créer la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "NouvelleTerreBridge ${{ steps.version.outputs.version }} (${{ steps.version.outputs.sha }})"
          body: |
            Build automatique depuis le commit `${{ steps.version.outputs.sha }}`.

            **Installation :** dépose `nouvelle-terre-bridge-${{ steps.version.outputs.version }}.jar` dans `mods/`.
          files: |
            build/libs/nouvelle-terre-bridge-${{ steps.version.outputs.version }}.jar
          make_latest: true

      - name: Mettre à jour le mod sur le serveur
        run: |
          sudo apt-get install -y sshpass
          JAR="nouvelle-terre-bridge-${{ steps.version.outputs.version }}.jar"
          sshpass -p "${{ secrets.SFTP_PASSWORD }}" sftp -P 2022 -o StrictHostKeyChecking=no yellox605.30551e80@7017.mystrator.com << EOF
          cd /mods
          rm nouvelle-terre-bridge-*.jar
          put build/libs/$JAR /mods/$JAR
          bye
          EOF

      - name: Redémarrer le serveur via API Minestrator
        run: |
          curl -s -X POST "https://minestrator.com/api/client/servers/30551e80/power" \
            -H "Authorization: Bearer ${{ secrets.MINESTRATOR_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{"signal": "restart"}' \
            -o /tmp/restart_response.json
          cat /tmp/restart_response.json
          echo "Redémarrage demandé"

      - name: Déclencher la mise à jour du modpack
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PACK_UPDATE_TOKEN }}
          repository: 0Sacha/Nouvelle-Terre-SMP---Pack
          event-type: mod-released