name: Compiler NouvelleTerreBridge

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Installer Gradle 8.8
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Compiler le mod
        run: gradle build

      - name: Uploader le JAR
        uses: actions/upload-artifact@v4
        with:
          name: nouvelle-terre-bridge
          path: build/libs/nouvelle-terre-bridge-1.0.0.jar
          retention-days: 30
